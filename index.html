<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>فتح رابط</title>

<style>
body{
font-family:Arial;
text-align:center;
margin-top:80px;
background:#f5f5f5;
}

.box{
background:white;
padding:25px;
border-radius:12px;
width:350px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:90%;
padding:10px;
margin-top:10px;
font-size:16px;
}

button{
margin-top:15px;
padding:10px 20px;
font-size:16px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
<h2>فتح رابط</h2>

<input id="link" placeholder="ضع الرابط هنا">

<br>

<button onclick="openLink()">فتح الرابط</button>
</div>

<script>
function openLink(){
let url=document.getElementById("link").value.trim();

if(!url){
alert("اكتب رابط");
return;
}

if(!url.startsWith("http")){
url="https://"+url;
}

window.open(url,"_blank");
}
</script>

</body>
</html>
